# Gitleaks configuration for nSelf ecosystem
# P96 S102 — canonical credential scanner rules
# P4 E5 W1 S02 T07 — comprehensive allowlist for confirmed false positives
title = "nSelf Gitleaks Config"

[extend]
useDefault = true

[[rules]]
id = "stripe-live-key"
description = "Stripe Live Secret Key"
regex = '''sk_live_[a-zA-Z0-9]{24,}'''
tags = ["stripe", "secret"]

[[rules]]
id = "github-pat-classic"
description = "GitHub Personal Access Token (classic)"
regex = '''ghp_[a-zA-Z0-9]{36,}'''
tags = ["github", "pat"]

[[rules]]
id = "github-pat-fine-grained"
description = "GitHub Fine-Grained Personal Access Token"
regex = '''github_pat_[a-zA-Z0-9_]{82,}'''
tags = ["github", "pat"]

[[rules]]
id = "aws-access-key"
description = "AWS Access Key ID"
regex = '''AKIA[A-Z0-9]{16}'''
tags = ["aws", "secret"]

[[rules]]
id = "google-api-key"
description = "Google API Key"
regex = '''AIza[A-Za-z0-9_\-]{35}'''
tags = ["google", "secret"]

[[rules]]
id = "rsa-private-key"
description = "RSA Private Key Header"
regex = '''-----BEGIN RSA PRIVATE KEY-----'''
tags = ["ssh", "secret"]

[[rules]]
id = "ec-private-key"
description = "EC Private Key Header"
regex = '''-----BEGIN EC PRIVATE KEY-----'''
tags = ["ssh", "secret"]

[[rules]]
id = "openssh-private-key"
description = "OpenSSH Private Key Header"
regex = '''-----BEGIN OPENSSH PRIVATE KEY-----'''
tags = ["ssh", "secret"]

[[rules]]
id = "nself-license-key"
description = "nSelf Pro Plugin License Key"
regex = '''nself_pro_[a-zA-Z0-9]{32,}'''
tags = ["nself", "license", "secret"]

[allowlist]
description = "Allow known test fixtures, documentation examples, and verified false positives (P4 E5 W1 S02 T07)"

# False-positive paths: docs, tests, storybook, secret-scanner source, wiki
paths = [
  '''.gitleaks.toml''',
  # Documentation files with example keys, curl commands, API examples
  '''docs/.*''',
  '''.wiki/.*''',
  '''API\.md''',
  # Docs QA acceptance test fixtures
  '''qa/gitleaks-acceptance-test\.md''',
  # Test data and fixture files
  '''testdata/.*''',
  '''test/.*fixtures.*''',
  '''.*__tests__/.*''',
  '''.*\.test\.(js|ts|jsx|tsx)$''',
  '''.*\.spec\.(js|ts|jsx|tsx)$''',
  # Secret scanner source — contains regex patterns for detecting key headers
  # (the patterns themselves look like secrets to gitleaks)
  '''frontend/src/lib/secrets/secret-scanner\.ts''',
  # Secret detection scripts — same: regex patterns for private key headers
  '''\.github/scripts/scan-secrets\.ts''',
  # Integration test for secret scanning — tests use fake keys by design
  '''frontend/src/lib/secrets/__tests__/.*''',
  # Keyboard shortcuts — high-entropy keybinding strings, not secrets
  '''frontend/src/lib/keyboard/shortcuts\.ts''',
  '''src/lib/keyboard/shortcuts\.ts''',
  '''src/lib/shortcuts/key-parser\.ts''',
  # Auth registration-lock contains token format strings (not real tokens)
  '''frontend/src/lib/auth/registration-lock\.ts''',
  '''src/lib/auth/registration-lock\.ts''',
  # Storybook compiled static assets
  '''.*storybook-static/.*''',
  # iOS release workflow — doc comment describing .p8 format, not an actual key
  '''\.github/workflows/ios-release\.yml''',
  # Gitleaks CI workflow definition
  '''\.github/workflows/gitleaks\.yml''',
  # Docker compose files with placeholder passwords
  '''\.github/deploy/docker/docker-compose\.yml''',
  '''docker-compose\.yml''',
  # Hasura metadata yaml (contains action body templates)
  '''backend/hasura/metadata/actions\.yaml''',
  # Test-prod validation script (uses test/example values)
  '''scripts/test-prod-validation\.sh''',
  # Frontend Vite source (bot API content)
  '''frontend-vite/.*''',
  # Src mirror of frontend (duplicate findings)
  '''src/app/.*''',
  '''src/__tests__/.*''',
  '''src/lib/.*''',
]

# Regex-based suppression for known-safe patterns
regexes = [
  # Fake test keys for CI gate testing
  '''sk_live_FAKE_TEST_FOR_CI_GATE''',
  '''AKIA_FAKE_TEST_KEY_DO_NOT_USE''',
  '''AIza_FAKE_GOOGLE_KEY_DO_NOT_USE''',
  '''nself_pro_FAKE_TEST_KEY_DO_NOT_USE''',
  # AWS example key from AWS official docs (not a real key)
  '''AKIAIOSFODNN7EXAMPLE''',
  # Stripe test keys (sk_test_ prefix — not live keys)
  '''sk_test_[a-zA-Z0-9]+''',
  # Stripe placeholder in docs (all x characters)
  '''sk_live_[xX]{24,}''',
  # GitHub PAT placeholder examples (all x-characters)
  '''ghp_[xX]{36,}''',
  # Placeholder/template format (CHANGE_ME pattern)
  '''CHANGE_ME''',
  # mock-key-content is not a real private key value
  '''mock-key-content''',
  # nself license key examples in docs/UI
  '''nself_pro_[xX]{32,}''',
  # JWT with explicit placeholder signature
  '''\.signature_part_here$''',
  # Test JWT tokens with obvious placeholder payloads
  '''eyJhbGciOiJIUzI1NiJ9\.''',
  # Discord dev-only client IDs used in test fixtures
  '''1234567890123456789''',
]

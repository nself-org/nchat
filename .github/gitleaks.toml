title = "nSelf nChat gitleaks config"

[extend]
useDefault = true

[allowlist]
paths = [
  # Dependency directories — third-party code, not source (excluded from --no-git scans)
  '''node_modules/''',
  '''\.pnpm/''',
  # Test files — mock credentials are intentional test vectors
  '''.*_test\.dart''',
  '''.*\.test\.ts''',
  '''.*\.spec\.ts''',
  '''test/''',
  '''testdata/''',
  '''\.bats$''',
  # Secret scanner source files contain the regex patterns they scan for — not real secrets
  '''src/security/secret-scanner\.ts''',
  '''src/security/''',
  '''frontend/src/lib/secrets/''',
  '''.github/scripts/scan-secrets\.ts''',
  # API docs contain example JWT tokens and placeholder secrets
  '''API\.md''',
  # docker-compose has placeholder JWT secret (32-char placeholder, not a real key)
  '''docker-compose\.yml''',
  # Test scripts use explicit test-prefixed secrets
  '''scripts/test-prod-validation\.sh''',
  # Keyboard shortcut strings falsely match generic-api-key pattern
  '''src/lib/keyboard/shortcuts\.ts''',
  '''src/lib/shortcuts/key-parser\.ts''',
  # Webhook page uses obvious fake tokens in UI mockdata
  '''src/app/admin/webhooks/''',
  # Example and template env files — placeholder values only
  '''\.env\.example$''',
  '''\.example\.env$''',
  '''\.env\.template$''',
  '''\.env\.dev$''',
  '''\.env\.staging$''',
  # Documentation and reference files — contain example credentials and API keys
  '''docs/''',
  '''\.wiki/''',
  '''\.github/wiki/''',
  '''\.github/docs/''',
  '''\.github/workflows/''',
  '''\.claude/''',
  # Hasura metadata — action handler URLs contain port numbers matching generic-api-key
  '''backend/hasura/metadata/actions\.yaml''',
  # Devtools example bot API call with placeholder auth header (curl example, not a real secret)
  '''frontend-vite/src/components/devtools/''',
  # Storybook static build — gitignored artifact, findings are from minified React source
  '''packages/ui/storybook-static/''',
]
regexes = [
  # Crockford Base32 alphabet constant used in token generation (not a secret)
  '''ABCDEFGHJKLMNPQRSTUVWXYZ23456789''',
  # Apple .p8 key placeholder text in OAuth setup guide (historical commit, file removed)
  '''\.\.\.contents of \.p8 file\.\.\.''',
]

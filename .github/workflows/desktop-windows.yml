name: Desktop — Windows (Tauri 2)

on:
  push:
    tags: ['v*']
  pull_request:
    paths:
      - 'nchat/desktop/**'
      - '.github/workflows/desktop-windows.yml'
  workflow_dispatch:

concurrency:
  group: desktop-windows-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  build:
    name: Build (x64)
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: nchat/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: nchat/desktop/src-tauri -> target
          key: windows-x64-${{ hashFiles('nchat/desktop/src-tauri/Cargo.lock') }}

      - name: Install pnpm deps
        working-directory: nchat
        run: pnpm install --frozen-lockfile

      - name: Build Tauri (Windows x64)
        working-directory: nchat/desktop
        run: pnpm tauri build --target x86_64-pc-windows-msvc
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # T17: EV code-signing via SSL.com eSigner — gated on org secret presence.
      # DPI is handled automatically by Tauri 2's Windows manifest (T23 — no custom manifest needed).
      - name: Sign Windows MSI (EV, SSL.com eSigner)
        if: ${{ secrets.SSL_COM_USERNAME != '' }}
        uses: SSLcom/esigner-codesign@v1.3.2
        with:
          command: sign
          username: ${{ secrets.SSL_COM_USERNAME }}
          password: ${{ secrets.SSL_COM_PASSWORD }}
          credential_id: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.SSL_COM_TOTP_SECRET }}
          file_path: nchat/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          override: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-x64
          path: |
            nchat/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            nchat/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            nchat/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi.zip
            nchat/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi.zip.sig
          retention-days: 14

      # T18 — publish updater feed to S3 (tag pushes only)
      - name: Publish updater feed (S3)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.HETZNER_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HETZNER_S3_SECRET_KEY }}
          AWS_DEFAULT_REGION: eu-central-1
          AWS_ENDPOINT_URL: https://fsn1.your-objectstorage.com
        run: |
          for sig in nchat/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi.zip.sig; do
            [ -f "$sig" ] || continue
            aws s3 cp "$sig" s3://packages.nself.org/chat-desktop/ --endpoint-url "$AWS_ENDPOINT_URL"
            aws s3 cp "${sig%.sig}" s3://packages.nself.org/chat-desktop/ --endpoint-url "$AWS_ENDPOINT_URL"
          done

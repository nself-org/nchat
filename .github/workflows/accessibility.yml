name: Accessibility Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  a11y-lint:
    name: Accessibility Linting (jsx-a11y)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run ESLint with jsx-a11y rules
        run: HASURA_ADMIN_SECRET=ci-lint-placeholder-not-a-real-secret pnpm lint
        continue-on-error: false
        # next lint loads next.config.js which has a build gate requiring this env var.
        # CI uses a non-functional placeholder — no real Hasura instance is used during linting.

  a11y-unit:
    name: Accessibility Unit Tests (jest-axe)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run accessibility unit tests
        run: pnpm --filter @nself-chat/web exec jest --testPathPattern="a11y|accessibility" --passWithNoTests --forceExit

  a11y-e2e:
    name: Accessibility E2E Tests (Playwright + Axe)
    runs-on: ubuntu-latest
    # 60 min: ~12 min backend start + ~8 min build + ~35 min axe tests + buffer.
    timeout-minutes: 60
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # ── Backend provisioning ────────────────────────────────────────────────
      # The @a11y Playwright tests navigate real app pages; those pages call
      # backend APIs (GraphQL, Auth). Without a running backend the browser
      # gets ECONNREFUSED and the tests fail with network errors rather than
      # accessibility violations. Provision the same nself stack that the E2E
      # Web workflow uses so axe can inspect fully-rendered pages.
      - name: Prepare backend .env for CI
        run: |
          cp backend/.env.dev backend/.env
          sed -i 's|^HASURA_GRAPHQL_ADMIN_SECRET=.*|HASURA_GRAPHQL_ADMIN_SECRET=hasura-admin-secret-dev-ci-only-32|' backend/.env
          printf '\n# CI-generated computed vars (replaces nself build .env.computed)\n' >> backend/.env
          printf 'DATABASE_URL=postgresql://postgres:postgres-dev-password@postgres:5432/nchat\n' >> backend/.env
          printf 'DOCKER_NETWORK=nchat_network\n' >> backend/.env
          printf 'HASURA_GRAPHQL_JWT_SECRET={"type":"HS256","key":"nchat-development-secret-key-minimum-32-characters"}\n' >> backend/.env
        working-directory: .

      - name: Start nself backend stack
        run: |
          docker compose -f docker-compose.yml pull --quiet
          docker compose -f docker-compose.yml up -d
        working-directory: backend

      - name: Wait for Hasura health
        run: |
          echo "Waiting for Hasura at http://localhost:8080/healthz ..."
          for i in $(seq 1 24); do
            if curl -sf http://localhost:8080/healthz > /dev/null 2>&1; then
              echo "Hasura healthy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/24 — waiting 5 s ..."
            sleep 5
          done
          echo "ERROR: Hasura did not become healthy within 120 s" >&2
          exit 1
        working-directory: .

      - name: Wait for Auth service health
        run: |
          echo "Waiting for Auth at http://localhost:4000/healthz ..."
          for i in $(seq 1 24); do
            if curl -sf http://localhost:4000/healthz > /dev/null 2>&1; then
              echo "Auth healthy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/24 — waiting 5 s ..."
            sleep 5
          done
          echo "ERROR: Auth service did not become healthy within 120 s" >&2
          exit 1
        working-directory: .

      - name: Seed E2E test users
        run: |
          AUTH_URL="http://localhost:4000"
          PASSWORD="password123"

          seed_user() {
            local email="$1"
            local display="$2"
            local role="$3"
            local http_code
            http_code=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "$AUTH_URL/v1/signup/email-password" \
              -H "Content-Type: application/json" \
              -d "{\"email\":\"$email\",\"password\":\"$PASSWORD\",\"options\":{\"displayName\":\"$display\",\"locale\":\"en\",\"metadata\":{\"role\":\"$role\"}}}")
            if [ "$http_code" = "200" ] || [ "$http_code" = "201" ]; then
              echo "Created: $email"
            elif [ "$http_code" = "409" ] || [ "$http_code" = "422" ]; then
              echo "Already exists (ok): $email"
            else
              echo "WARNING: unexpected HTTP $http_code for $email"
            fi
          }

          seed_user "owner@nself.org"     "Test Owner"     "owner"
          seed_user "admin@nself.org"     "Test Admin"     "admin"
          seed_user "moderator@nself.org" "Test Moderator" "moderator"
          seed_user "member@nself.org"    "Test Member"    "member"
          seed_user "guest@nself.org"     "Test Guest"     "guest"

          echo "Seeding complete."
        working-directory: .
      # ── End backend provisioning ────────────────────────────────────────────

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install Playwright browsers
        # All browser projects (chromium, firefox, webkit, mobile-chrome, mobile-safari, tablet)
        # are defined in playwright.config.ts — all three engines must be installed.
        # Installing only chromium causes webkit/mobile-safari/tablet tests to fail with
        # "Executable doesn't exist" errors.
        run: npx playwright install --with-deps

      - name: Build application
        run: pnpm build
        env:
          HASURA_ADMIN_SECRET: 'hasura-admin-secret-dev-ci-only-32'
          NEXT_PUBLIC_USE_DEV_AUTH: 'true'
          NEXT_PUBLIC_ENV: 'test'

      - name: Run Playwright accessibility tests
        run: pnpm --filter @nself-chat/web exec playwright test --grep "@a11y"
        env:
          CI: true
          NEXT_PUBLIC_USE_DEV_AUTH: 'true'
          NEXT_PUBLIC_ENV: 'test'
          NEXT_PUBLIC_GRAPHQL_URL: 'http://localhost:8080/v1/graphql'
          NEXT_PUBLIC_AUTH_URL: 'http://localhost:4000'
          NEXT_PUBLIC_STORAGE_URL: 'http://localhost:9000'
          HASURA_ADMIN_SECRET: 'hasura-admin-secret-dev-ci-only-32'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-a11y-report
          path: frontend/playwright-report/
          retention-days: 30

  lighthouse:
    name: Lighthouse Accessibility Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build application
        run: HASURA_ADMIN_SECRET=ci-test-placeholder-not-a-real-secret NEXT_PUBLIC_USE_DEV_AUTH=true NEXT_PUBLIC_ENV=test pnpm build
        # Satisfy next.config.js build gate: HASURA_ADMIN_SECRET must be set
        # for production builds. CI uses a non-functional placeholder — the app
        # never connects to a real Hasura instance during Lighthouse tests.

      - name: Start application
        # next start loads next.config.js which has a build gate requiring HASURA_ADMIN_SECRET.
        # CI uses a non-functional placeholder — the app never connects to a real Hasura instance.
        run: HASURA_ADMIN_SECRET=ci-test-placeholder-not-a-real-secret PORT=3000 pnpm start &

      - name: Wait for server
        # sleep 10 was insufficient — Next.js production server can take 60-90 s on
        # ubuntu-latest. Use wait-on with a 120 s cap so the job fails fast if the
        # server never starts rather than hanging until the 20-minute job timeout.
        run: npx wait-on http://localhost:3000 --timeout 120000

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3000
            http://localhost:3000/chat
            http://localhost:3000/settings
          configPath: 'frontend/.lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-results
          path: frontend/.lighthouseci/

  i18n-validation:
    name: Translation Coverage Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Validate translation coverage
        working-directory: frontend
        run: pnpm tsx scripts/validate-translations.ts

      - name: Generate translation report
        if: always()
        working-directory: frontend
        run: |
          echo "## Translation Coverage Report" >> $GITHUB_STEP_SUMMARY
          pnpm tsx scripts/validate-translations.ts 2>&1 | tail -n 50 >> $GITHUB_STEP_SUMMARY

  accessibility-summary:
    name: Accessibility Summary
    runs-on: ubuntu-latest
    needs: [a11y-lint, a11y-unit, a11y-e2e, lighthouse, i18n-validation]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "# Accessibility Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint jsx-a11y | ${{ needs.a11y-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| jest-axe Unit Tests | ${{ needs.a11y-unit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Playwright + Axe E2E | ${{ needs.a11y-e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lighthouse Audit | ${{ needs.lighthouse.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| i18n Validation | ${{ needs.i18n-validation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.a11y-lint.result }}" == "success" && \
                "${{ needs.a11y-unit.result }}" == "success" && \
                "${{ needs.a11y-e2e.result }}" == "success" && \
                "${{ needs.lighthouse.result }}" == "success" ]]; then
            echo "## ✅ All accessibility tests passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Some accessibility tests failed" >> $GITHUB_STEP_SUMMARY
            echo "Please review the individual test results above." >> $GITHUB_STEP_SUMMARY
          fi

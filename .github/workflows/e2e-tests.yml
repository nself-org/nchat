name: E2E Tests

on:
  push:
    branches: [main]
    paths:
      - 'frontend/src/**'
      - 'frontend/tests/**'
      - 'frontend/playwright.config.ts'
      - '.github/workflows/e2e-tests.yml'
  pull_request:
    paths:
      - 'frontend/src/**'
      - 'frontend/tests/**'
      - 'frontend/playwright.config.ts'
      - '.github/workflows/e2e-tests.yml'
  workflow_dispatch:
    inputs:
      device:
        description: 'Device to test (ios, android, all)'
        required: true
        default: 'all'
        type: choice
        options:
          - ios
          - android
          - all

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '17'
  XCODE_VERSION: '15.2'
  NSELF_VERSION: '1.1.3'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  # Web E2E Tests (Playwright) — sharded across 3 parallel jobs so the full
  # suite completes within the GH Actions job limit.  Each shard:
  #   1. Provisions the nself backend on the same runner (so Docker containers
  #      are reachable at localhost — GHA jobs are isolated ephemeral runners,
  #      so backend setup must live IN the same job, not a separate depends-on job).
  #   2. Builds the Next.js app.
  #   3. Runs its slice of Playwright tests.
  # The merge job collects all blob reports and produces a single HTML report.
  e2e-web:
    name: E2E Web Tests (shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    runs-on: ubuntu-latest
    # 75 min: ~12 min backend start + ~8 min build + ~50 min for the shard's
    # test slice with retries.
    timeout-minutes: 75

    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3]
        shardTotal: [3]

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Backend provisioning ────────────────────────────────────────────────
      # Install the nself CLI and start the pre-generated backend/docker-compose.yml
      # on this runner so the Playwright webServer and tests can reach localhost
      # services (Hasura :8080, Auth :4000, MinIO :9000).
      #
      # --skip-build: uses the committed backend/docker-compose.yml as-is;
      # skips the license-gated rebuild step — no plugin license key required.
      # DNS for local.nself.org is not resolvable in CI; nself warns but does
      # not block because isTerminal() returns false in non-TTY environments.
      - name: Install nself CLI v${{ env.NSELF_VERSION }}
        run: |
          gh release download "v${{ env.NSELF_VERSION }}" \
            --repo nself-org/cli \
            --pattern "nself-${{ env.NSELF_VERSION }}-linux-amd64.tar.gz" \
            --output nself.tar.gz
          # Tarball extracts to nself-<version>-linux-amd64/nself (subdirectory)
          tar -xzf nself.tar.gz
          sudo mv "nself-${{ env.NSELF_VERSION }}-linux-amd64/nself" /usr/local/bin/nself
          sudo chmod +x /usr/local/bin/nself
          nself version
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Prepare nself project state
        # The committed backend/ has a v0.9.8 build artifact (.nself/build-version).
        # nself start needs (a) a build-state marker to recognise the directory as an
        # initialised project, and (b) --allow-legacy to skip the v0.9 artifact check.
        # We create a minimal state file here so the CLI finds the project without
        # requiring nself init (which would overwrite committed config).
        run: |
          mkdir -p backend/.nself/build-state
          printf 'timestamp=0\n' > backend/.nself/build-state/last-build.state
        working-directory: .

      - name: Start nself backend stack
        run: nself start --skip-build --allow-legacy --quiet
        working-directory: backend
        env:
          HASURA_GRAPHQL_ADMIN_SECRET: ${{ secrets.HASURA_ADMIN_SECRET || 'hasura-admin-secret-dev' }}

      - name: Wait for Hasura health
        run: |
          echo "Waiting for Hasura at http://localhost:8080/healthz ..."
          for i in $(seq 1 24); do
            if curl -sf http://localhost:8080/healthz > /dev/null 2>&1; then
              echo "Hasura healthy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/24 — waiting 5 s ..."
            sleep 5
          done
          echo "ERROR: Hasura did not become healthy within 120 s" >&2
          exit 1
        working-directory: .

      - name: Wait for Auth service health
        run: |
          echo "Waiting for Auth at http://localhost:4000/healthz ..."
          for i in $(seq 1 24); do
            if curl -sf http://localhost:4000/healthz > /dev/null 2>&1; then
              echo "Auth healthy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/24 — waiting 5 s ..."
            sleep 5
          done
          echo "ERROR: Auth service did not become healthy within 120 s" >&2
          exit 1
        working-directory: .

      - name: Seed E2E test users
        # Create the five deterministic users the e2e.new specs rely on.
        # Direct port (4000) — not nginx-proxied domain, which is not resolvable in CI.
        # 409/already-exists is success so the step is idempotent across re-runs.
        run: |
          AUTH_URL="http://localhost:4000"
          PASSWORD="password123"

          seed_user() {
            local email="$1"
            local display="$2"
            local role="$3"
            local http_code
            http_code=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "$AUTH_URL/v1/signup/email-password" \
              -H "Content-Type: application/json" \
              -d "{\"email\":\"$email\",\"password\":\"$PASSWORD\",\"options\":{\"displayName\":\"$display\",\"locale\":\"en\",\"metadata\":{\"role\":\"$role\"}}}")
            if [ "$http_code" = "200" ] || [ "$http_code" = "201" ]; then
              echo "Created: $email"
            elif [ "$http_code" = "409" ] || [ "$http_code" = "422" ]; then
              echo "Already exists (ok): $email"
            else
              echo "WARNING: unexpected HTTP $http_code for $email (code $http_code)"
            fi
          }

          seed_user "owner@nself.org"     "Test Owner"     "owner"
          seed_user "admin@nself.org"     "Test Admin"     "admin"
          seed_user "moderator@nself.org" "Test Moderator" "moderator"
          seed_user "member@nself.org"    "Test Member"    "member"
          seed_user "guest@nself.org"     "Test Guest"     "guest"

          echo "Seeding complete."
        working-directory: .
      # ── End backend provisioning ────────────────────────────────────────────

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build application
        run: pnpm build
        env:
          # Match the admin secret the running nself backend uses (.env.dev default).
          HASURA_ADMIN_SECRET: ${{ secrets.HASURA_ADMIN_SECRET || 'hasura-admin-secret-dev' }}
          NEXT_PUBLIC_USE_DEV_AUTH: 'true'
          NEXT_PUBLIC_ENV: 'test'

      - name: Run Playwright E2E tests (shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
        run: pnpm test:e2e --project=chromium --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          CI: true
          NEXT_PUBLIC_USE_DEV_AUTH: 'true'
          NEXT_PUBLIC_ENV: 'test'
          # Wire the running backend into the Playwright webServer and specs.
          # nself stack binds: Hasura :8080, Auth :4000, MinIO :9000.
          NEXT_PUBLIC_GRAPHQL_URL: 'http://localhost:8080/v1/graphql'
          NEXT_PUBLIC_AUTH_URL: 'http://localhost:4000'
          NEXT_PUBLIC_STORAGE_URL: 'http://localhost:9000'
          HASURA_ADMIN_SECRET: ${{ secrets.HASURA_ADMIN_SECRET || 'hasura-admin-secret-dev' }}

      - name: Upload blob report for merge
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: frontend/blob-report/
          retention-days: 1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ matrix.shardIndex }}
          path: frontend/test-results/
          retention-days: 7

  # Merge shard blob reports into a single HTML report
  e2e-web-merge:
    name: E2E Web Tests — Merge Reports
    runs-on: ubuntu-latest
    needs: e2e-web
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
        working-directory: frontend

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into HTML report
        run: pnpm exec playwright merge-reports --reporter html ./all-blob-reports
        working-directory: frontend

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # iOS E2E Tests (Simulator — no real device required)
  e2e-ios:
    name: E2E iOS Tests (Simulator)
    runs-on: macos-14
    timeout-minutes: 60
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.device == 'ios' || github.event.inputs.device == 'all')

    defaults:
      run:
        working-directory: frontend

    strategy:
      fail-fast: false
      matrix:
        device:
          - 'iPhone 15 Pro'
          - 'iPhone SE (3rd generation)'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer
        working-directory: .

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Add iOS native project
        run: npx cap add ios 2>/dev/null || true
        working-directory: platforms/mobile

      - name: Sync Capacitor (iOS)
        run: npx cap sync ios
        working-directory: platforms/mobile

      - name: Install CocoaPods
        run: |
          cd platforms/mobile/ios/App
          pod install

      - name: Build iOS app for testing
        run: |
          cd platforms/mobile/ios/App
          xcodebuild build-for-testing \
            -scheme App \
            -destination "platform=iOS Simulator,name=${{ matrix.device }}" \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Create and boot iOS simulator
        run: |
          xcrun simctl create "E2E-${{ matrix.device }}" \
            "$(xcrun simctl list devicetypes -j | python3 -c "import sys,json;types=json.load(sys.stdin)['devicetypes'];print(next(t['identifier'] for t in types if '${{ matrix.device }}' in t['name']))")" \
            "$(xcrun simctl list runtimes -j | python3 -c "import sys,json;runtimes=json.load(sys.stdin)['runtimes'];print(next(r['identifier'] for r in runtimes if 'iOS-17' in r['identifier']))")"
          UDID=$(xcrun simctl list devices -j | python3 -c "import sys,json;devices=json.load(sys.stdin)['devices'];all=[d for devs in devices.values() for d in devs];print(next(d['udid'] for d in all if d['name']=='E2E-${{ matrix.device }}'))")
          xcrun simctl boot "$UDID"
        working-directory: .

      - name: Run Playwright mobile tests (web view)
        run: pnpm test:e2e --project=mobile-safari
        env:
          CI: true
          NEXT_PUBLIC_USE_DEV_AUTH: 'true'

      - name: Upload iOS test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-artifacts-${{ matrix.device }}
          path: frontend/test-results/
          retention-days: 7

  # Android E2E Tests (Emulator)
  e2e-android:
    name: E2E Android Tests (Emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.device == 'android' || github.event.inputs.device == 'all')

    defaults:
      run:
        working-directory: frontend

    strategy:
      fail-fast: false
      matrix:
        api-level: [34]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Add Android native project
        run: npx cap add android 2>/dev/null || true
        working-directory: platforms/mobile

      - name: Sync Capacitor (Android)
        run: npx cap sync android
        working-directory: platforms/mobile

      - name: Build Android app (debug)
        run: |
          cd platforms/mobile/android
          ./gradlew assembleDebug

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}-x86_64

      - name: Create AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "AVD snapshot created."

      - name: Run Playwright mobile tests (web view)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: cd frontend && pnpm test:e2e --project=mobile-chrome

      - name: Upload Android test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-artifacts-api${{ matrix.api-level }}
          path: frontend/test-results/
          retention-days: 7

  # BrowserStack Real Device Tests (optional — requires secrets)
  e2e-browserstack:
    name: E2E BrowserStack (Real Devices)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && vars.BROWSERSTACK_ENABLED == 'true'

    defaults:
      run:
        working-directory: frontend

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ios
            device: 'iPhone 15 Pro Max'
            os_version: '17'
          - platform: android
            device: 'Samsung Galaxy S23'
            os_version: '13.0'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build app for BrowserStack
        run: |
          cd platforms/mobile
          if [ "${{ matrix.platform }}" == "ios" ]; then
            npx cap add ios 2>/dev/null || true
            npx cap sync ios
          else
            npx cap add android 2>/dev/null || true
            npx cap sync android
          fi

      - name: Upload app to BrowserStack
        run: |
          if [ "${{ matrix.platform }}" == "ios" ]; then
            APP_PATH="platforms/mobile/ios/App/build/Build/Products/Release-iphoneos/App.ipa"
          else
            APP_PATH="platforms/mobile/android/app/build/outputs/apk/release/app-release.apk"
          fi
          curl -u "${{ secrets.BROWSERSTACK_USERNAME }}:${{ secrets.BROWSERSTACK_ACCESS_KEY }}" \
            -X POST "https://api-cloud.browserstack.com/app-automate/upload" \
            -F "file=@$APP_PATH" \
            -F "custom_id=nchat-${{ matrix.platform }}" > app_url.json
          echo "BROWSERSTACK_APP_URL=$(python3 -c "import json; print(json.load(open('app_url.json'))['app_url'])")" >> $GITHUB_ENV

      - name: Run Appium tests on BrowserStack
        run: pnpm exec wdio appium.config.js
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          BROWSERSTACK_APP_URL: ${{ env.BROWSERSTACK_APP_URL }}

      - name: Upload BrowserStack test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browserstack-reports-${{ matrix.platform }}
          path: frontend/test-results/
          retention-days: 7

  # Test Results Summary
  e2e-summary:
    name: E2E Test Summary
    runs-on: ubuntu-latest
    needs: [e2e-web]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "# E2E Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Web (Playwright) | ${{ needs.e2e-web.result }} |" >> $GITHUB_STEP_SUMMARY

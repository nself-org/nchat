# nchat Hasura Actions — Wave B2 (P3)
# Registers all 7 plugin workstreams as Hasura Actions.
# Handler URLs point to plugin REST endpoints.
# All actions: kind: synchronous, forward_client_headers: true
# X-Source-Account-ID forwarded for multi-app isolation (Convention Wall).

# ─────────────────────────────────────────────────────────────────────────────
# web3  (plugin-web3:3128)
# ─────────────────────────────────────────────────────────────────────────────
actions:
  - name: web3VerifyTokenGate
    definition:
      kind: synchronous
      handler: http://plugin-web3:3128/api/v1/gate-checks
      forward_client_headers: true
      headers:
        - name: X-Source-Account-ID
          value_from_env: HASURA_GRAPHQL_X_SOURCE_ACCOUNT_ID
      request_transform:
        method: POST
        content_type: application/json
        body:
          action: transform
          template: "{{ $body.input.input }}"
    comment: "Verify an NFT/token gate check for a user; records pass/fail with expiry."
    permissions:
      - role: user

  - name: web3CreateTokenGate
    definition:
      kind: synchronous
      handler: http://plugin-web3:3128/api/v1/token-gates
      forward_client_headers: true
      headers:
        - name: X-Source-Account-ID
          value_from_env: HASURA_GRAPHQL_X_SOURCE_ACCOUNT_ID
      request_transform:
        method: POST
        content_type: application/json
        body:
          action: transform
          template: "{{ $body.input.input }}"
    comment: "Create a new token gate for a workspace channel or thread."
    permissions:
      - role: user

  - name: web3RpcCall
    definition:
      kind: synchronous
      handler: http://plugin-web3:3128/api/v1/rpc/{{$body.input.input.chainId}}
      forward_client_headers: true
      headers:
        - name: X-Source-Account-ID
          value_from_env: HASURA_GRAPHQL_X_SOURCE_ACCOUNT_ID
      request_transform:
        method: POST
        content_type: application/json
        body:
          action: transform
          template: "{{ $body.input.input.payload }}"
    comment: "Proxy a JSON-RPC call to the specified chain through the web3 plugin."
    permissions:
      - role: user

# ─────────────────────────────────────────────────────────────────────────────
# livekit / meetings  (livekit-plugin, meetings-plugin)
# ─────────────────────────────────────────────────────────────────────────────
  - name: liveKitToken
    definition:
      kind: synchronous
      handler: http://livekit-plugin/api/v1/tokens
      forward_client_headers: true
      headers:
        - name: X-Source-Account-ID
          value_from_env: HASURA_GRAPHQL_X_SOURCE_ACCOUNT_ID
      request_transform:
        method: POST
        content_type: application/json
        body:
          action: transform
          template: "{{ $body.input.input }}"
    comment: "Generate a signed LiveKit JWT for a user to join a room."
    permissions:
      - role: user

  - name: createMeeting
    definition:
      kind: synchronous
      handler: http://meetings-plugin/api/v1/events
      forward_client_headers: true
      headers:
        - name: X-Source-Account-ID
          value_from_env: HASURA_GRAPHQL_X_SOURCE_ACCOUNT_ID
      request_transform:
        method: POST
        content_type: application/json
        body:
          action: transform
          template: "{{ $body.input.input }}"
    comment: "Create a scheduled meeting event."
    permissions:
      - role: user

  - name: joinMeeting
    definition:
      kind: synchronous
      handler: http://meetings-plugin/api/v1/attendees
      forward_client_headers: true
      headers:
        - name: X-Source-Account-ID
          value_from_env: HASURA_GRAPHQL_X_SOURCE_ACCOUNT_ID
      request_transform:
        method: POST
        content_type: application/json
        body:
          action: transform
          template: "{{ $body.input.input }}"
    comment: "Register the current user as an attendee for a meeting event."
    permissions:
      - role: user

  - name: endMeeting
    definition:
      kind: synchronous
      handler: http://meetings-plugin/api/v1/events/{{$body.input.input.id}}
      forward_client_headers: true
      headers:
        - name: X-Source-Account-ID
          value_from_env: HASURA_GRAPHQL_X_SOURCE_ACCOUNT_ID
      request_transform:
        method: PUT
        content_type: application/json
        body:
          action: transform
          template: '{"status": "cancelled"}'
    comment: "End (cancel) a meeting event."
    permissions:
      - role: user

  - name: getRecording
    definition:
      kind: synchronous
      handler: http://livekit-plugin/api/v1/recordings/{{$body.input.room_name}}/{{$body.input.recording_id}}
      forward_client_headers: true
      headers:
        - name: X-Source-Account-ID
          value_from_env: HASURA_GRAPHQL_X_SOURCE_ACCOUNT_ID
      request_transform:
        method: GET
    comment: "Retrieve recording metadata for a room (S3-backed, in-process TS)."
    permissions:
      - role: user


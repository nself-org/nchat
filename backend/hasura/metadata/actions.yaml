      request_transform:
        method: GET
    comment: "Check whether a device needs to upload more one-time pre-keys."
    permissions:
      - role: user

  - name: e2eePostSafetyNumber
    definition:
      kind: synchronous
      handler: http://nself-e2ee:3055/api/v1/e2ee/safety-number
      forward_client_headers: true
      headers:
        - name: X-Source-Account-ID
          value_from_env: HASURA_GRAPHQL_X_SOURCE_ACCOUNT_ID
      request_transform:

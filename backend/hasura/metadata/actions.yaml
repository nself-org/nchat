        body:
          action: transform
          template: "{{ $body.input.input }}"
    comment: "Register a device identity key (ML-KEM-1024 / Ed25519 public key)."
    permissions:
      - role: user

  - name: e2eeUploadSignedPreKey
    definition:
      kind: synchronous
      handler: http://nself-e2ee:3055/api/v1/e2ee/signed-prekey

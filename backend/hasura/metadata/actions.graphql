# ─────────────────────────────────────────────────────────────────────────────
# Action mutations / queries (Hasura action operation definitions)
# ─────────────────────────────────────────────────────────────────────────────

type Mutation {
  # web3
  web3VerifyTokenGate(input: Web3VerifyTokenGateInput!): Web3VerifyTokenGateOutput
  web3CreateTokenGate(input: Web3CreateTokenGateInput!): Web3CreateTokenGateOutput
  web3RpcCall(input: Web3RpcCallInput!): Web3RpcCallOutput

  # livekit / meetings
  liveKitToken(input: LiveKitTokenInput!): LiveKitTokenOutput
  createMeeting(input: CreateMeetingInput!): MeetingOutput
  joinMeeting(input: JoinMeetingInput!): AttendeeOutput
  endMeeting(input: EndMeetingInput!): MeetingOutput

  # e2ee
  e2eeRegisterIdentity(input: E2eeRegisterIdentityInput!): StatusOutput
  e2eeUploadSignedPreKey(input: E2eeUploadSignedPreKeyInput!): E2eeSignedPreKeyOutput
  e2eeUploadOneTimePreKeys(input: E2eeUploadOneTimePreKeysInput!): E2eeUploadOneTimePreKeysOutput
  e2eePostSafetyNumber(input: E2eePostSafetyNumberInput!): E2eeSafetyNumberOutput

  # search
  searchReindex(input: SearchReindexInput!): SearchReindexOutput

  # moderation
  moderationEnqueue(input: ModerationEnqueueInput!): ModerationEnqueueOutput
  moderationDecide(input: ModerationDecideInput!): ModerationDecideOutput
  moderationSetSlowmode(input: ModerationSlowmodeInput!): ModerationSlowmodeOutput
  moderationBulkAction(input: ModerationBulkActionInput!): ModerationBulkActionOutput
  moderationApplyPenalty(input: ModerationPenaltyInput!): ModerationPenaltyOutput

  # content-safety
  contentSafetyRaid(input: ContentSafetyRaidInput!): ContentSafetyRaidOutput

  # auth
  authSignIn(input: AuthSignInInput!): AuthSignInOutput
  authSignUp(input: AuthSignUpInput!): AuthSignUpOutput
  authSignOut(input: AuthSignOutInput!): StatusOutput
  authRefreshToken(input: AuthRefreshInput!): AuthTokenOutput
  authVerifyPassword(input: AuthVerifyPasswordInput!): AuthVerifyPasswordOutput
  authChangePassword(input: AuthChangePasswordInput!): StatusOutput
  authResetPassword(input: AuthResetPasswordInput!): StatusOutput
  authVerifyEmail(input: AuthVerifyEmailInput!): StatusOutput
  authAddTrustedDevice(input: AuthTrustedDeviceInput!): AuthTrustedDeviceOutput
  authRevokeTrustedDevice(input: AuthTrustedDeviceInput!): StatusOutput
  authGenerateBackupCodes(input: AuthBackupCodesInput!): AuthBackupCodesOutput
  authSetRegistrationLock(input: AuthRegistrationLockInput!): AuthRegistrationLockOutput
  authOAuthCallback(input: AuthOAuthCallbackInput!): AuthOAuthCallbackOutput
  authIdmeVerify(input: AuthIdmeVerifyInput!): AuthIdmeOutput
  authSsoCallback(input: AuthSsoCallbackInput!): AuthSsoCallbackOutput
  authSsoInitiate(input: AuthSsoInitiateInput!): AuthSsoInitiateOutput

  # billing — stripe
  billingCreateCheckout(input: BillingCreateCheckoutInput!): BillingCreateCheckoutOutput
  billingCreatePaymentIntent(input: BillingCreatePaymentIntentInput!): BillingPaymentIntentOutput
  billingCreatePortalSession(input: BillingPortalSessionInput!): BillingPortalSessionOutput
  billingRefund(input: BillingRefundInput!): BillingRefundOutput
  billingInvoicePay(input: BillingInvoicePayInput!): BillingInvoicePayOutput
  billingInvoiceVoid(input: BillingInvoiceVoidInput!): BillingInvoiceVoidOutput
  billingRecordUsage(input: BillingUsageRecordInput!): BillingUsageRecordOutput

  # billing — entitlements
  subscriptionPause(input: SubscriptionPauseInput!): SubscriptionPauseOutput
  subscriptionResume(input: SubscriptionResumeInput!): SubscriptionResumeOutput
  subscriptionUpgrade(input: SubscriptionUpgradeInput!): SubscriptionUpgradeOutput
  subscriptionGetProration(input: SubscriptionProrationInput!): SubscriptionProrationOutput
  entitlementGrantCreate(input: EntitlementGrantCreateInput!): EntitlementGrantOutput
  entitlementGrantRevoke(input: EntitlementGrantRevokeInput!): EntitlementGrantRevokeOutput
}

type Query {
  # livekit
  getRecording(room_name: String!, recording_id: String!): jsonb

  # e2ee
  e2eeGetPreKeyBundle(input: E2eeGetPreKeyBundleInput!): E2eePreKeyBundle
  e2eeCheckReplenish(input: E2eeCheckReplenishInput!): E2eeReplenishOutput
  e2eeGetVerificationState(input: E2eeGetVerificationStateInput!): E2eeVerificationStateOutput
  e2eeListAudit(input: E2eeListAuditInput!): [E2eeAuditEntry!]

  # search
  searchQuery(input: SearchQueryInput!): SearchQueryOutput
  knowledgeQuery(input: KnowledgeQueryInput!): KnowledgeQueryOutput

  # content-safety
  contentSafetyAnalyze(input: ContentSafetyAnalyzeInput!): ContentSafetyAnalyzeOutput
  contentSafetySpamCheck(input: ContentSafetySpamInput!): ContentSafetySpamOutput

  # auth
  authListSessions(input: AuthSessionListInput!): AuthSessionListOutput
  authOAuthInitiate(input: AuthOAuthInitiateInput!): AuthOAuthInitiateOutput

  # billing
  billingInvoiceUpcoming(input: BillingInvoiceUpcomingInput!): BillingInvoiceUpcomingOutput
  entitlementsBatch(input: EntitlementsBatchInput!): EntitlementsBatchOutput
  entitlementGrantList(input: EntitlementGrantListInput!): EntitlementGrantListOutput
}

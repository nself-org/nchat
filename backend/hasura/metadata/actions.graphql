# nchat Hasura Action type definitions — Wave B2 (P3)
# Groups: web3 | livekit/meetings | e2ee | search/knowledge | moderation | auth | billing
# All actions pass X-Source-Account-ID for multi-app isolation.

# ─────────────────────────────────────────────────────────────────────────────
# Shared scalar / generic output
# ─────────────────────────────────────────────────────────────────────────────

type StatusOutput {
  status: String!
}

# ─────────────────────────────────────────────────────────────────────────────
# web3
# ─────────────────────────────────────────────────────────────────────────────

input Web3VerifyTokenGateInput {
  gate_id: uuid!
  user_id: uuid!
  wallet_address: String!
  passed: Boolean!
  expires_at: timestamptz
}

type Web3VerifyTokenGateOutput {
  id: uuid!
}

input Web3CreateTokenGateInput {
  workspace_id: uuid!
  created_by: uuid!
  name: String!
  gate_type: String!
  rules: jsonb!
  target_type: String!
  target_id: uuid!
}

type Web3CreateTokenGateOutput {
  id: uuid!
}

input Web3RpcCallInput {
  chainId: String!
  payload: jsonb!
}

type Web3RpcCallOutput {
  result: jsonb
}

# ─────────────────────────────────────────────────────────────────────────────
# livekit / meetings
# ─────────────────────────────────────────────────────────────────────────────

input LiveKitTokenInput {
  room_name: String!
  identity: String!
  ttl: Int
  can_publish: Boolean
  can_subscribe: Boolean
  can_publish_data: Boolean
  room_admin: Boolean
}

type LiveKitTokenOutput {
  token: String!
  room: String!
  identity: String!
  expires_in: Int!
}

input CreateMeetingInput {
  title: String!
  start_time: timestamptz!
  end_time: timestamptz!
  organizer_id: uuid!
  description: String
  workspace_id: uuid
  channel_id: uuid
  max_attendees: Int
}

type MeetingOutput {
  id: uuid!
  title: String!
  start_time: timestamptz!
  end_time: timestamptz!
  organizer_id: uuid!
  status: String!
  created_at: timestamptz!
}

input JoinMeetingInput {
  event_id: uuid!
  user_id: uuid!
  status: String!
}

type AttendeeOutput {
  id: uuid!
  event_id: uuid!
  user_id: uuid!
  status: String!
  joined_at: timestamptz
}

input EndMeetingInput {
  id: uuid!
  status: String!
}

# ─────────────────────────────────────────────────────────────────────────────
# e2ee (8 actions — http://nself-e2ee:3055)
# ─────────────────────────────────────────────────────────────────────────────

input E2eeRegisterIdentityInput {
  user_id: uuid!

}

input E2eeOneTimeKey {
  key_id: Int!
  public_key: String!
}

input E2eeKyberPreKey {
  key_id: Int!
  public_key: String!
  signature: String!
}

input E2eeUploadOneTimePreKeysInput {
  user_id: uuid!
  device_id: String!
  identity_key_public: String!
  one_time_keys: [E2eeOneTimeKey!]!

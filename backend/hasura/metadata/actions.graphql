}

# ─────────────────────────────────────────────────────────────────────────────
# search + knowledge
# ─────────────────────────────────────────────────────────────────────────────

input SearchQueryInput {
  q: String!
  filter: jsonb
  limit: Int
  offset: Int
}

type SearchHit {
  id: String!

}

input KnowledgeQueryInput {
  q: String!
  limit: Int
  offset: Int
}

type KnowledgeItem {
  id: uuid!
  kind: String!
  title: String!
  slug: String!
  created_at: timestamptz!
}

type KnowledgeQueryOutput {
  data: [KnowledgeItem!]!
}


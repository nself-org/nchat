# nchat_reactions — Message reactions (F-NCHAT-01 Wave-5B remediation)
#
# Convention Wall: source_account_id = Multi-App Isolation (NOT tenant_id)

- table:
    schema: public
    name: nchat_reactions
  select_permissions:
    - role: user
      permission:
        columns: '*'
        filter:
          source_account_id:
            _eq: X-Source-Account
  insert_permissions:
    - role: user
      permission:
        columns:
          - id
          - source_account_id
          - message_id
          - user_id
          - emoji
          - emoji_id
        check:
          source_account_id:
            _eq: X-Source-Account
  delete_permissions:
    - role: user
      permission:
        filter:
          source_account_id:
            _eq: X-Source-Account

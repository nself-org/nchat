# nchat_threads — Message threads (F-NCHAT-01 Wave-5B remediation)
#
# Convention Wall: source_account_id = Multi-App Isolation (NOT tenant_id)

- table:
    schema: public
    name: nchat_threads
  select_permissions:
    - role: user
      permission:
        columns: '*'
        filter:
          source_account_id:
            _eq: X-Source-Account
  insert_permissions:
    - role: user
      permission:
        columns:
          - id
          - source_account_id
          - channel_id
          - root_message_id
          - name
          - created_by
        check:
          source_account_id:
            _eq: X-Source-Account
  update_permissions:
    - role: user
      permission:
        columns:
          - name
          - is_locked
          - is_archived
          - auto_archive_duration
        filter:
          source_account_id:
            _eq: X-Source-Account
  delete_permissions:
    - role: user
      permission:
        filter:
          source_account_id:
            _eq: X-Source-Account

# Rate Limiting Configuration
# S10-T02 defaults: auth=60/min, read=600/min per IP
# Adjustable via environment variables:
#   RATE_LIMIT_AUTH_RPM  — auth endpoint rate limit in requests/min  (default: 60)
#   RATE_LIMIT_READ_RPM  — read endpoint rate limit in requests/min  (default: 600)

# General and API zones
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=graphql_api:10m rate=100r/m;

# Auth endpoints: RATE_LIMIT_AUTH_RPM requests/min per IP (default 60)
limit_req_zone $binary_remote_addr zone=auth:10m rate=60r/m;

# Read endpoints: RATE_LIMIT_READ_RPM requests/min per IP (default 600)
limit_req_zone $binary_remote_addr zone=read:10m rate=600r/m;

# MFA verification: 5 attempts/min per IP (hard limit, not adjustable)
limit_req_zone $binary_remote_addr zone=mfa_verify:10m rate=5r/m;

# Upload, static, and service zones
limit_req_zone $binary_remote_addr zone=uploads:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=static:10m rate=1000r/m;
limit_req_zone $binary_remote_addr zone=webhooks:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=functions:10m rate=50r/m;
limit_req_zone $http_authorization zone=user_api:10m rate=1000r/m;

# Inbound webhooks: 120 req/min per IP (burst 30)
limit_req_zone $binary_remote_addr zone=webhook_in:10m rate=120r/m;

# Admin API: 30 req/min per IP (burst 5)
limit_req_zone $binary_remote_addr zone=admin_api:10m rate=30r/m;

# Connection limits
limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;
limit_conn_zone $server_name zone=conn_limit_server:10m;

# Rate limit status
limit_req_status 429;
limit_conn_status 429;
